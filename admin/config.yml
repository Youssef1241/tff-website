backend:
  name: github
  repo: Youssef1241/tff-website
  branch: main
  base_url: https://sveltia-cms-auth.yussef0212.workers.dev

media_folder: "images"

collections:
  - name: "courses"
    label: "Courses"
    files:
      - name: "courses"
        label: "Courses"
        file: "_data/courses.json"
        fields:
          - label: "Courses"
            name: "courses"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "uuid" }
              - { label: "Thumbnail", name: "thumbnail", widget: "image" }
              - { label: "Price", name: "price", widget: "string" }
              - label: "English"
                name: "en"
                widget: "object"
                fields: 
                - { label: "Title", name: "title", widget: "string" }
                - { label: "Body", name: "body", widget: "markdown" }
              - label: "Arabic"
                name: "ar"
                widget: "object"
                fields: 
                - { label: "Title", name: "title", widget: "string" }
                - { label: "Body", name: "body", widget: "markdown" }

  - name: "newsletter"
    label: "Newsletter"
    files:
      - name: "newsletter-en"
        label: "Newsletter (English)"
        file: "_data/newsletter-en.json"
        fields:
          - label: "Issues"
            name: "issues"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "uuid" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime" }
              - { label: "Body", name: "body", widget: "markdown" }

      - name: "newsletter-ar"
        label: "Newsletter (Arabic)"
        file: "_data/newsletter-ar.json"
        fields:
          - label: "Issues"
            name: "issues"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "uuid" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime" }
              - { label: "Body", name: "body", widget: "markdown" }