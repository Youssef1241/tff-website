<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="استكشف دورات التربية لدينا. منظمتنا موجهة نحو الأبوة والأمومة، مع تركيز خاص على دور الأمهات، إذ يُعدّ دورهن محورياً في مجتمعنا. تقودنا الدكتورة مارلين بسطاوروس.">
        <meta name="author" content="">

        <title>نحو عائلة فاعلة</title>
        <meta property="og:title" content="الدورات | نحو عائلة فاعلة" />
        <meta property="og:description" content="استكشف دورات التربية لدينا. منظمتنا موجهة نحو الأبوة والأمومة، مع تركيز خاص على دور الأمهات، إذ يُعدّ دورهن محورياً في مجتمعنا. تقودنا الدكتورة مارلين بسطاوروس." />
        <meta property="og:url" content="https://functionalfamiliestherapy.com/ar/courses.html" />
        <meta property="og:image" content="https://functionalfamiliestherapy.com/images/tff-logo.png" />
        <meta property="og:type" content="website" />
        <link rel="icon" type="image/x-icon" href="/images/tff-logo.png">

        <!-- CSS FILES -->        
        <link href="/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/bootstrap-icons.css" rel="stylesheet">
        <link href="/css/tff-stylesheet.css" rel="stylesheet">


</head>
    
<body>
<div id="ar-navbar"></div>

            <section class="section-padding">
                <div class="container-fluid px-5">
                    <div class="row"">

                        <div class="col-lg-10 col-12 header-section">
                            <h2>الكورسات</h2>
                        </div>

                        <div class="col-12 my-3 mb-5">
                            <hr class="divider">
                        </div>
                        <div class="col-12">
                            <div class="row mt-5 justify-content-center" id="courses-container">
                            <script>
                                const lang = "ar";
                                fetch('/_data/courses.json').then(res=>res.json()).then(data=>{
                                    const container = document.getElementById("courses-container");
                                    data.courses.forEach(content => {
                                        const course = content[lang];
                                        container.innerHTML += `
                                    <div class="col-lg-5 col-md-6 col-sm-8 col-12 course-card-wrap">
                                        <div class="course-card">
                                            <a href="course.html?id=${content.id}" class="stretched-link"></a>
                
                                                    <img src="${content.thumbnail}" class="course-image" alt="${course.title} — صورة الدورة">
                                                    
                
                                        </div>
                                        <div class="course-text">
                                            <h5 class="mt-4 ">${course.title}</h5>
                                        </div>
                                    </div>
                                        `;
                                    });
                                })
                            </script>
                            </div>
                        </div>
                            
                        </div>

                    </div>
                </div>
            </section>

            
        </main>

        <div id="ar-footer"></div>

        <!-- JAVASCRIPT FILES -->
        <script src="/js/include.js"></script>
        <script src="/js/jquery.min.js"></script>
        <script src="/js/bootstrap.min.js"></script>
        <script src="/js/jquery.sticky.js"></script>
        <!-- <script src="js/sideways-scroll.js"></script> -->

    </body>
</html>
