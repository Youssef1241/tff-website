<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="اطّلع على تفاصيل الدورة وسجّل الآن. منظمتنا موجهة نحو الأبوة والأمومة، مع تركيز خاص على دور الأمهات، إذ يُعدّ دورهن محورياً في مجتمعنا. تقودنا الدكتورة مارلين بسطاوروس.">
        <meta name="author" content="">

        <title>نحو عائلة فاعلة</title>
        <meta property="og:title" content="تفاصيل الدورة | نحو عائلة فاعلة" />
        <meta property="og:description" content="اطّلع على تفاصيل الدورة وسجّل الآن. منظمتنا موجهة نحو الأبوة والأمومة، مع تركيز خاص على دور الأمهات، إذ يُعدّ دورهن محورياً في مجتمعنا. تقودنا الدكتورة مارلين بسطاوروس." />
        <meta property="og:url" content="https://functionalfamiliestherapy.com/ar/course.html" />
        <meta property="og:image" content="https://functionalfamiliestherapy.com/images/tff-logo.png" />
        <meta property="og:type" content="website" />
        <link rel="icon" type="image/x-icon" href="/images/tff-logo.png">

        <!-- CSS FILES -->        
        <link href="/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/bootstrap-icons.css" rel="stylesheet">
        <link href="/css/tff-stylesheet.css" rel="stylesheet">


</head>
    
<body>
<div id="ar-navbar"></div>

            <section class="section-padding">
                <div class="container-fluid px-5">
                    <div class="row"">

                        <div class="col-lg-10 col-12 text-right ms-auto me-5 header-section" id="header-section-id">
                            <h2 id="title"></h2>
                        </div>

                        <div class="col-12 my-3 mb-5">
                            <hr class="divider">
                        </div>
                        
                        <div class="container">
                            <div class="col-lg-10 col-md-6 col-sm-8 col-12 mx-auto">
                                <div class="single-course-wrapper mx-auto mb-5">
                                    <img class="single-course-image" id="image">
                                </div>
                                <div class="embed-video-wrap" id="embed-video">
                                    
                                </div>
                                <p class="course-description mx-auto mb-5 mt-3" id="description">
                                        
                                </p>
                                <p class="mx-auto text-center">السعر: <strong id="price"></strong> ج.م</p>

                                <script src="https://unpkg.com/marked@4.3.0/marked.min.js"></script>
                                <script>
                                    const params = new URLSearchParams(window.location.search);
                                    const courseId = params.get("id");
                                    const lang = "ar";
                                    
                                    fetch('/_data/courses.json')
                                    .then(res => res.json())
                                    .then(data => {
                                        const content = data.courses.find(c => c.id === courseId);
                                        const course = content[lang];

                                        document.getElementById("title").textContent = course.title;
                                        const embedVideo = document.getElementById("embed-video");
                                        if (content.video_url != undefined) {
                                        content.video_url.forEach(url =>{
                                            embedVideo.innerHTML += url;
                                        });
                                        }
                                        
                                        document.getElementById("description").innerHTML = marked.parse(course.body);
                                        document.getElementById("price").textContent = content.price;
                                        document.getElementById("image").src = content.thumbnail;
                                        document.getElementById("image").alt = course.title + " — صورة الدورة";

                                        const bookBtn = document.getElementById("book-button");
                                        if (bookBtn) {
                                            if(content.kids === true){
                                            bookBtn.href = `book-course-kids.html?id=${courseId}`;
                                            }
                                            else{
                                                bookBtn.href = `book-course.html?id=${courseId}`;
                                            }
                                        }
                                    });
                                </script>
                                <div class="text-center">
                                    <a class="btn btn-outline-primary btn-lg w-50 book-button mb-4" id="book-button" href="#">
                                        احجز
                                    </a>
                                    <a class="btn btn-outline-secondary btn-lg w-50 back-button" href="/ar/courses.html">
                                      رجوع الي الكورسات
                                    </a>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </section>

            
        </main>

        <div id="ar-footer"></div>

        <!-- JAVASCRIPT FILES -->
        <script src="/js/include.js"></script>
        <script src="/js/jquery.min.js"></script>
        <script src="/js/bootstrap.min.js"></script>
        <script src="/js/jquery.sticky.js"></script>
        <!-- <script src="js/sideways-scroll.js"></script> -->

    </body>
</html>
