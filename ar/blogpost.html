<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="">
        <meta name="author" content="">

        <title>نحو عائلة فاعلة</title>
        <link rel="icon" type="image/x-icon" href="/images/tff-logo.png">

        <!-- CSS FILES -->        
        <link href="/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/bootstrap-icons.css" rel="stylesheet">
        <link href="/css/tff-stylesheet.css" rel="stylesheet">


</head>
    
<body>
<div id="ar-navbar"></div>

            <section class="section-padding">
                <div class="container-fluid px-5">
                    <div class="row">

                        <h1 id="title"></h1>

                        <div class="col-12 blog-post">
                            <i class="bi bi-clock ms-2"></i><i id="date"></i>
                            <div id="description"></div>
                            
                        </div>
                        <script src="https://unpkg.com/marked@4.3.0/marked.min.js"></script>
                            <script>
                                const params = new URLSearchParams(window.location.search)
                                const postId = params.get("id");

                                fetch('https://raw.githubusercontent.com/Youssef1241/tff-website/main/_data/newsletter-ar.json').then(res=>res.json().then(data=>{
                                    const post = data.issues.find(p => p.id === postId);
                                    
                                    document.getElementById("title").textContent = post.title;
                                    document.getElementById("date").innerHTML = post.date;
                                    document.getElementById("description").innerHTML = marked.parse(post.body);
                                }));

                            </script>

                        </div>
                    </div>
                </div>
            </section>

            
        </main>

        <div id="ar-footer"></div>

        <!-- JAVASCRIPT FILES -->
        <script src="/js/clean-posts.js"></script>
        <script src="/js/include.js"></script>
        <script src="/js/jquery.min.js"></script>
        <script src="/js/bootstrap.min.js"></script>
        <script src="/js/jquery.sticky.js"></script>
        <script src="/js/click-scroll.js"></script>
        <script src="/js/counter.js"></script>
        <script src="/js/custom.js"></script>
        <!-- <script src="js/sideways-scroll.js"></script> -->

    </body>
</html>
