<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXjgYaKKd6-JK5mvwYKLoEqSnDQ8XAs9-t5n52iWL3h1U-HA9ZxwyE99BV2LXsafFfaw/exec";
    document.getElementById("book-course-form").addEventListener("submit", async function(e) {
        e.preventDefault();
        const formData = {
            name: e.target.name.value,
            email: e.target.email.value,
            message: "test"
        };
        try{
            await(fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(formData)
            }));
            document.getElementById("book-course-result").innerHTML = `<div class="alert alert-success" role="alert">تم التسجيل بنجاح</div>`
            e.target.reset();
        }catch(error){
            document.getElementById("book-course-result").innerHTML = `<div class="alert alert-danger" role="alert">حدث خطأ ما عند التسجيل</div>`
        }
            })
    
</script>
