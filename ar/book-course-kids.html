<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="">
        <meta name="author" content="">

        <title>نحو عائلة فاعلة</title>
        <link rel="icon" type="image/x-icon" href="/images/tff-logo.png">

        <!-- CSS FILES -->        
        <link href="/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/bootstrap-icons.css" rel="stylesheet">
        <link href="/css/tff-stylesheet.css" rel="stylesheet">


</head>
    
<body>
<div id="ar-navbar"></div>
            <script>let selectedCourse = null;</script>
            <section class="section-padding">
                <div class="container-fluid px-5">
                    <div class="row"">

                        <div class="col-lg-10 col-12 header-section">
                            <h2 id="title"></h2>
                        </div>

                        <div class="col-12 my-3 mb-5">
                            <hr class="divider">
                        </div>
                        
                        <div class="container">
                            <div class="col-lg-8 col-md-12 col-sm-12 col-12 mx-auto">
                                <div class="single-course-wrapper mx-auto mb-5">
                                    <img class="book-course-image" id="image">
                                </div>

                                <div class="book-course-form mt-5 mx-auto" id ="form-wrapper">


                                <form class="custom-form course-form mb-5 mt-5 " id="book-course-form">
                                    <div class="mb-3">
                                        <label for="name" class="form-label">الاسم</label>
                                        <input type="text" class="form-control" id="name" name="name" placeholder="ادخل اسمك">
                                    </div>
                                    <div class="mb-3">
                                        <label for="email" class="form-label">البريد الإلكتروني</label>
                                        <input type="email" class="form-control" id="email" name="email" placeholder="ادخل بريدك الإلكتروني">
                                    </div>
                                    <div class="mb-3" id="tel-in">
                                        <label for="phoneNumber" class="form-label">رقم التليفون</label>
                                        <input type="tel" pattern="[0-9]*" inputmode="numeric" class="form-control" id="phoneNumber" name="phoneNumber" placeholder="ادخل رقم التليفون الخاص بك" required>
                                        <div id="phone-error" class="invalid-feedback" style="display:none; text-align:right;">يرجى إدخال رقم تليفون صحيح</div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="courses" class="form-label">الكورسات</label>
                                        <textarea class="form-control" id="courses" name="courses" placeholder="اكتب أسماء الكورسات التي دخلتها"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label for="booksRead" class="form-label">الكتب التي قرأتها</label>
                                        <textarea class="form-control" id="booksRead" name="booksRead" placeholder="اكتب أسماء الكتب التي قرأتها"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label for="therapist" class="form-label">هل سبق وزرت معالجاً؟</label>
                                        <input type="text" class="form-control" id="therapist" name="therapist" placeholder="اكتب نعم أو لا أو تفاصيل إن وجدت">
                                    </div>
                                    <div class="mb-3">
                                        <label for="job" class="form-label">الوظيفة</label>
                                        <input type="text" class="form-control" id="job" name="job" placeholder="ادخل وظيفتك الحالية">
                                    </div>
                                    <div class="mb-3">
                                        <label for="kids" class="form-label">عندك كم طفل</label>
                                        <textarea class="form-control" id="kids" name="kids" placeholder="قولنا عندك كام طفل و ايه اعمارهم"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label for="kidProblems" class="form-label">ايه مشاكلك مع اطفالك</label>
                                        <textarea class="form-control" id="kidProblems" name="kidProblems" placeholder="احكلنا عن مشاكلك مع اطفالك او اي صعوبات معاهم"></textarea>
                                    </div>
                                    <button type="submit" class="book-button btn btn-primary w-100">إرسال</button>
                                    <div  class="text-center mt-3">
                                        <strong>*برجاء العلم ان تأكيد الحجز بدفع نصف المبلغ من خلال هذا الرقم: <a href="tel:01272523330" class="contact-number">012 72523330</a></strong>
                                    </div>
                                </form>
                            </div>
                            <div id="book-course-result" class="mt-3"></div>
                            <script>
                                const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXjgYaKKd6-JK5mvwYKLoEqSnDQ8XAs9-t5n52iWL3h1U-HA9ZxwyE99BV2LXsafFfaw/exec";

                                document.getElementById("book-course-form").addEventListener("submit", async function(e) {
                                    e.preventDefault();
                                    const formData = {
                                        course: selectedCourse.title,
                                        name: e.target.elements.name.value,
                                        email: e.target.elements.email.value,
                                        phoneNumber: e.target.elements.phoneNumber.value,
                                        courses: e.target.elements.courses.value,
                                        booksRead: e.target.elements.booksRead.value,
                                        therapist: e.target.elements.therapist.value,
                                        job: e.target.elements.job.value,
                                        kids: e.target.elements.kids.value,
                                        kidProblems: e.target.elements.kidProblems.value
                                    };
                                    try{
                                        await(fetch(SCRIPT_URL, {
                                            method: "POST",
                                            body: JSON.stringify(formData)
                                        }));
                                        document.getElementById("book-course-result").innerHTML = `<div class="alert alert-success text-center" role="alert">تم التسجيل بنجاح ✅</div>`
                                        e.target.reset();
                                    }catch(error){
                                        document.getElementById("book-course-result").innerHTML = `<div class="alert alert-danger text-center" role="alert">حدث خطأ ما عند التسجيل ❌</div>`
                                    }
                                        })
                                
                            </script>

                            <script>
                            const params = new URLSearchParams(window.location.search);
                            const courseId = params.get("id");
                            
                            fetch('/_data/courses.json')
                                .then(res => res.json())
                                .then(data => {
                                    const lang = "ar";
                                    const content = data.courses.find(c => c.id === courseId);
                                    if (content && content["ar"]) {
                                        selectedCourse = content["ar"];
                                        document.getElementById("title").textContent = 'احجز في " ' + selectedCourse.title + '"' ;
                                        document.getElementById("image").src = content.thumbnail;
                                    } else {
                                        selectedCourse = null;
                                    }
                                });
                            </script>
                            </div>
                        </div>

                    </div>
                </div>
            </section>

            
        </main>

        <div id="ar-footer"></div>

        <!-- JAVASCRIPT FILES -->
        <script src="/js/include.js"></script>
        <script src="/js/jquery.min.js"></script>
        <script src="/js/bootstrap.min.js"></script>
        <script src="/js/jquery.sticky.js"></script>
        <!-- <script src="js/sideways-scroll.js"></script> -->

    </body>
</html>
