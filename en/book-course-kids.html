<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="">
        <meta name="author" content="">

        <title>Towards Functional Families</title>
        <link rel="icon" type="image/x-icon" href="/images/tff-logo.png">

        <!-- CSS FILES -->        
        <link href="/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/bootstrap-icons.css" rel="stylesheet">
        <link href="/css/tff-stylesheet.css" rel="stylesheet">

</head>
    
<body>
<div id="en-navbar"></div>
            <section class="section-padding">
                <div class="container-fluid px-5">
                    <div class="row"">

                        <div class="col-lg-10 col-12 header-section header-section-en">
                            <h2 id="title"></h2>
                        </div>

                        <div class="col-12 my-3 mb-5">
                            <hr class="divider">
                        </div>
                        
                        <div class="container">
                            <div class="col-lg-8 col-md-12 col-sm-12 col-12 mx-auto">
                                <div class="single-course-wrapper mx-auto mb-5">
                                    <img class="book-course-image" id="image">
                                </div>

                                <div class="book-course-form mt-5 mx-auto" id="form-wrapper">
                                    <form class="custom-form course-form mb-5 mt-5" id="book-course-form">
                                        <div class="mb-3">
                                            <label for="name" class="form-label">Name *</label>
                                            <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
                                        </div>
                                        <div class="mb-3">
                                            <label for="email" class="form-label">Email *</label>
                                            <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com" required dir="ltr">
                                            <div id="email-error" class="invalid-feedback" style="display:none; text-align:left;">Please enter a valid email address</div>
                                        </div>
                                        <div class="mb-3" id="tel-in">
                                            <label for="phoneNumber" class="form-label">Phone Number *</label>
                                            <input type="tel" pattern="[0-9\u0660-\u0669\u06F0-\u06F9]*" inputmode="numeric" class="form-control phone-number-en" id="phoneNumber" name="phoneNumber" placeholder="Enter your phone number" required>
                                            <div id="phone-error" class="invalid-feedback" style="display:none; text-align:left;">Please enter a valid phone number</div>
                                        </div>
                                        <div class="mb-3">
                                            <label for="courses" class="form-label">Courses</label>
                                            <textarea class="form-control" id="courses" name="courses" placeholder="Write the names of the courses you attended"></textarea>
                                        </div>
                                        <div class="mb-3">
                                            <label for="booksRead" class="form-label">Books You Have Read</label>
                                            <textarea class="form-control" id="booksRead" name="booksRead" placeholder="Write the names of books you have read"></textarea>
                                        </div>
                                        <div class="mb-3">
                                            <label for="therapist" class="form-label">Have you visited a therapist before?</label>
                                            <input type="text" class="form-control" id="therapist" name="therapist" placeholder="Write yes, no, or any details">
                                        </div>
                                        <div class="mb-3">
                                            <label for="job" class="form-label">Job</label>
                                            <input type="text" class="form-control" id="job" name="job" placeholder="Enter your current job">
                                        </div>
                                        <div class="mb-3">
                                            <label for="kids" class="form-label">How many children do you have?</label>
                                            <textarea class="form-control" id="kids" name="kids" placeholder="Tell us how many children you have and their ages"></textarea>
                                        </div>
                                        <div class="mb-3">
                                            <label for="kidProblems" class="form-label">What issues are you facing with your children?</label>
                                            <textarea class="form-control" id="kidProblems" name="kidProblems" placeholder="Tell us about your issues with your children or any difficulties with them"></textarea>
                                        </div>
                                        <button type="submit" class="book-button btn btn-primary w-100">Submit</button>
                                        <div class="text-center mt-3">
                                            <strong>*Please note that booking is confirmed by paying half the amount through this number: <a href="tel:01272523330" class="contact-number">012 72523330</a></strong>
                                        </div>
                                    </form>
                                </div>
                                <div id="book-course-result" class="mt-3"></div>

                            </div>
                        </div>

                    </div>
                </div>
            </section>

            
        </main>

        <div id="en-footer"></div>

        <!-- JAVASCRIPT FILES -->
        <script src="/js/include.js"></script>
        <script src="/js/form-handling-en.js"></script>
        <script src="/js/jquery.min.js"></script>
        <script src="/js/bootstrap.min.js"></script>
        <script src="/js/jquery.sticky.js"></script>
        <!-- <script src="js/sideways-scroll.js"></script> -->

    </body>
</html>
