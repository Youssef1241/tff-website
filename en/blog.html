<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="">
        <meta name="author" content="">

        <title>Towards Functional Families</title>
        <link rel="icon" type="image/x-icon" href="/images/tff-logo.png">

        <!-- CSS FILES -->        
        <link href="/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/bootstrap-icons.css" rel="stylesheet">
        <link href="/css/tff-stylesheet.css" rel="stylesheet">
</head>
    
<body>
<div id="en-navbar"></div>

            <section class="section-padding">
                <div class="container-fluid px-5">
                    <div class="row"">

                        <div class="col-lg-10 col-12 text-left me-auto ms-5 header-section">
                            <h2>Newsletter</h2>
                        </div>

                        <div class="col-12 my-3 mb-5">
                            <hr class="divider">
                        </div>

                        <div class="col-12" id="post-container">
                            <script src="https://unpkg.com/marked@4.3.0/marked.min.js"></script>
                            <script>
                                fetch('/_data/newsletter-en.json').then(res=>res.json()).then(data=>{
                                    const container = document.getElementById("post-container");
                                    data.issues.forEach(post => {
                                        let text = getTextPreview(marked.parse(post.body));
                                        container.innerHTML += `
                                        <div class="col-lg-5 col-md-6 col-sm-8 col-12 mb-5 blog-card-wrapper ">
                                            <div class="blog-card">
                                                <a href="blogpost.html?id=${post.id}" class="stretched-link"></a>
                                                <h3>${post.title}</h3>
                                                <small><i class="bi bi-clock me-2"></i><i>${post.date}</i></small>
                                                <p class="blog-text">${text}</p>
                                                        
                    
                                            </div>
                                        </div>
                                        `
                                    });
                                })
                            </script>


                            </div>
                        </div>
                    </div>
                </div>
            </section>

            
        </main>

        <div id="en-footer"></div>

        <!-- JAVASCRIPT FILES -->
        <script src="/js/clean-posts.js"></script>
        <script src="/js/include.js"></script>
        <script src="/js/jquery.min.js"></script>
        <script src="/js/bootstrap.min.js"></script>
        <script src="/js/jquery.sticky.js"></script>
        <!-- <script src="js/sideways-scroll.js"></script> -->

    </body>
</html>
