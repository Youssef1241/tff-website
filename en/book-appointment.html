<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="">
        <meta name="author" content="">

        <title>Towards Functional Families</title>
        <link rel="icon" type="image/x-icon" href="/images/tff-logo.png">

        <!-- CSS FILES -->        
        <link href="/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/bootstrap-icons.css" rel="stylesheet">
        <link href="/css/tff-stylesheet.css" rel="stylesheet">

</head>
    
<body>
<div id="en-navbar"></div>

            <section class="section-padding">
                <div class="container-fluid px-5">
                    <div class="row"">

                        <div class="col-lg-10 col-12 text-right me-auto ms-5 header-section">
                            <h2 id="title">Book an Appointment</h2>
                        </div>

                        <div class="col-12 my-3 mb-5">
                            <hr class="divider">
                        </div>
                        
                        <div class="container">
                            <div class="col-lg-10 col-md-6 col-sm-8 col-12 mx-auto">
                                <div class="single-course-wrapper mx-auto mb-5">
                                    <img class="book-course-image" id="image">
                                </div>

                                <div class="book-course-form mt-5 mx-auto">
                                    <form method="POST" class="custom-form course-form mb-5 mt-5">
                                        <div class="mb-3">
                                            <label for="name" class="form-label">Name</label>
                                            <input type = "text" class="form-control" id="name" placeholder="Enter your name">
                                        </div>
                                        <div class="mb-3">
                                            <label for="email" class="form-label">Email</label>
                                            <input type = "email" class="form-control" id="email" placeholder="Enter your email">
                                        </div>
                                        <button type="submit" class="book-button btn btn-primary w-100">Submit</button>
                                    </form>
                                </div>


                            </div>
                        </div>

                    </div>
                </div>
            </section>

            
        </main>

        <div id="en-footer"></div>

        <!-- JAVASCRIPT FILES -->
        <script src="/js/include.js"></script>
        <script src="/js/jquery.min.js"></script>
        <script src="/js/bootstrap.min.js"></script>
        <script src="/js/jquery.sticky.js"></script>
        <script src="/js/click-scroll.js"></script>
        <script src="/js/counter.js"></script>
        <script src="/js/custom.js"></script>
        <!-- <script src="js/sideways-scroll.js"></script> -->

    </body>
</html>
