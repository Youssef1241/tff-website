<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="">
        <meta name="author" content="">

        <title>Towards Functional Families</title>
        <link rel="icon" type="image/x-icon" href="/images/tff-logo.png">

        <!-- CSS FILES -->        
        <link href="/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/bootstrap-icons.css" rel="stylesheet">
        <link href="/css/tff-stylesheet.css" rel="stylesheet">


</head>
    
<body>
<div id="en-navbar"></div>

            <section class="section-padding">
                <div class="container-fluid px-5">
                    <div class="row"">

                        <div class="col-lg-10 col-12 header-section header-section-en">
                            <h2>Events</h2>
                        </div>

                        <div class="col-12 my-3 mb-5">
                            <hr class="divider">
                        </div>

                        <div class="events-wrap" id="events-wrap"></div>
                        <script>
                            let events_content = ""
                            fetch('/_data/events-en.json')
                            .then(response => response.json())
                            .then(data => {
                                data.events.forEach(event => {
                                document.getElementById('events-wrap').innerHTML += `<div class="event-card-wrapper-event-card">
                                    <img src="${event.imgURL}" alt="Event Logo" class="event-card-image-en">
                                        <div class="event-card-content-en">
                                            <h3>${event.title}</h3>
                                            <small><i class="bi bi-clock ms-2"></i><i>${event.date}</i></small>
                                        </div>
                                    </div>
                                `
                            });
                            });

                        </script>
                    </div>
                </div>
            </section>

            
        </main>

        <div id="en-footer"></div>

        <!-- JAVASCRIPT FILES -->
        <script src="/js/clean-posts.js"></script>
        <script src="/js/include.js"></script>
        <script src="/js/jquery.min.js"></script>
        <script src="/js/bootstrap.min.js"></script>
        <script src="/js/jquery.sticky.js"></script>
        <!-- <script src="js/sideways-scroll.js"></script> -->

    </body>
</html>
